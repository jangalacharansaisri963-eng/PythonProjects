name: Build Calculator APK

on:
  push:
  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-22.04


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17


    - name: Setup Android SDK
      uses: android-actions/setup-android@v3


    - name: Accept licenses
      run: |
        yes | sdkmanager --licenses || true


    - name: Force Android SDK versions
      run: |
        sdkmanager \
        "platform-tools" \
        "platforms;android-35" \
        "build-tools;35.0.0"


    - name: Install build dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer==1.5.0
        pip install cython==0.29.36


    - name: Force Buildozer config
      run: |

        mkdir -p ~/.buildozer/android/platform/android-sdk

        sdkmanager \
        --sdk_root=$HOME/.buildozer/android/platform/android-sdk \
        "platform-tools" \
        "platforms;android-35" \
        "build-tools;35.0.0"


    - name: Clean old cache
      run: |
        rm -rf .buildozer
        rm -rf ~/.buildozer/cache


    - name: Build APK
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}
        ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      run: |
        buildozer android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-apk
        path: bin/*.apk
