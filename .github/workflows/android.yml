name: Python APK Generator

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libncurses5 libstdc++6 openjdk-17-jdk unzip zlib1g-dev libffi-dev libssl-dev

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer

    - name: Compile Android APK with Buildozer
      run: buildozer android debug

    - name: Upload Downloadable Python APK
      uses: actions/upload-artifact@v4
      with:
        name: CryptographicVault-Python-APK
        path: bin/*.apk
        retention-days: 7
        
