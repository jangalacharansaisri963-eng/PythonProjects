name: Build Calculator APK

on:
  push:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk


      - name: Install Buildozer
        run: |
          pip install --user buildozer cython


      - name: Buildozer prepare
        run: |
          buildozer android debug || true


      - name: Accept Buildozer SDK licenses
        run: |
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true


      - name: Build APK
        run: |
          buildozer android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: advanced-calculator-apk
          path: bin/*.apk
